name: Executar Estacao Meteorologica

on:
  schedule:
    # ☀️ Roda de 30 em 30 minutos das 06:00 às 19:00 no horário de Brasília (09:00 às 22:00 UTC)
    - cron: '*/30 9-22 * * *'

  workflow_dispatch: # Botão para você rodar manualmente quando quiser testar

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v3

      - name: Configurar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar as bibliotecas necessarias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Executar o Script Python
  run: python NOME_DO_SEU_ARQUIVO.py
